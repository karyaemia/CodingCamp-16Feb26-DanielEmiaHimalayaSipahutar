<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - karyaemia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">   
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased min-h-screen p-4 md:p-8 flex items-center justify-center">

    <main class="w-full max-w-6xl bg-white rounded-[2rem] shadow-2xl overflow-hidden grid grid-cols-1 lg:grid-cols-12">
        
        <section class="lg:col-span-4 bg-indigo-600 text-white p-8 flex flex-col justify-between">
    <div>
        <div class="flex items-center gap-4 mb-8">
            <img src="New.png" alt="Profile" class="w-12 h-12 rounded-full object-cover border-2 border-white/30 shadow-md">
            <div>
                 <h2 class="text-xl font-bold">Welcome, Bro!</h2>
                <p class="text-indigo-200 text-sm">Ready to conquer today?</p> 
                <p class="text-indigo-100 text-xs mt-1 opacity-80" id="current-day"></p>
</div>
        </div>

        <div class="bg-white/10 p-5 rounded-2xl backdrop-blur-sm mb-8 flex items-center justify-between shadow-inner">
    <div>
        <span class="text-sm font-medium text-indigo-100 block mb-1">Task Progress</span>
        <span class="text-3xl font-bold" id="progress-text">0%</span>
    </div>
    
    <div class="relative w-20 h-20 flex items-center justify-center">
        <svg class="w-full h-full transform -rotate-90">
            <circle cx="40" cy="40" r="34" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" />
            <circle id="progress-circle" cx="40" cy="40" r="34" 
                stroke="#ef4444" stroke-width="8" fill="transparent" 
                stroke-dasharray="213.6" stroke-dashoffset="213.6" 
                class="transition-all duration-700 ease-in-out" />
        </svg>
        <div class="absolute w-12 h-12 bg-indigo-600/50 rounded-full blur-[1px]"></div>
    </div>
</div>

        <h3 class="text-lg font-semibold mb-4 border-b border-indigo-400/30 pb-2">Create New Task</h3>
        
        <form id="todo-form" class="space-y-4">
            <div>
                <label class="text-xs text-indigo-200 mb-1 block">Task Name</label>
                <input type="text" id="task-input" placeholder="What needs to be done?" class="w-full p-3 bg-white/10 border border-indigo-400/30 rounded-xl outline-none focus:bg-white/20 placeholder-indigo-300 text-white" required>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs text-indigo-200 mb-1 block">Date</label>
                    <input type="date" id="date-input" class="w-full p-3 bg-white/10 border border-indigo-400/30 rounded-xl outline-none focus:bg-white/20 text-white input-date-time" required>
                </div>
                <div>
                    <label class="text-xs text-indigo-200 mb-1 block">Time</label>
                    <input type="time" id="time-input" class="w-full p-3 bg-white/10 border border-indigo-400/30 rounded-xl outline-none focus:bg-white/20 text-white input-date-time" required>
                </div>
            </div>

            <div>
                <label class="text-xs text-indigo-200 mb-1 block">Category</label>
                <select id="category-input" class="w-full h-12 pl-3 pr-10 bg-white/10 border border-indigo-400/30 rounded-xl outline-none focus:bg-white/20 text-white appearance-none bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20fill%3D%22none%22%20viewBox%3D%220%200%2020%2020%22%3E%3Cpath%20stroke%3D%22white%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20stroke-width%3D%221.5%22%20d%3D%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E')] bg-[length:1.5rem] bg-[right_0.75rem_center] bg-no-repeat">
                    <option value="Work" class="text-black bg-white">💼 Work</option>
                    <option value="Study" class="text-black bg-white">📚 Study</option>
                    <option value="Personal" class="text-black bg-white">🏠 Personal</option>
                    <option value="Urgent" class="text-black bg-white">🔥 Urgent</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-green-400 hover:bg-green-500 text-indigo-900 font-bold py-3.5 rounded-xl transition shadow-lg mt-2">Add to Dashboard</button>
        </form>
    </div>
</section>

        <section class="lg:col-span-8 p-8 bg-slate-50 flex flex-col h-[85vh] lg:h-auto">
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <h1 class="text-2xl font-bold text-slate-800">Your Tasks</h1>
                
                <div class="flex flex-wrap gap-2 w-full md:w-auto">
                    <select id="filter-status" class="appearance-none h-10 pl-3 pr-10 border border-slate-200 rounded-lg text-sm outline-none bg-white shadow-sm flex-1 md:flex-none cursor-pointer bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20fill%3D%22none%22%20viewBox%3D%220%200%2020%2020%22%3E%3Cpath%20stroke%3D%22%2364748b%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20stroke-width%3D%221.5%22%20d%3D%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E')] bg-[length:1.25rem] bg-[right_0.5rem_center] bg-no-repeat">
                        <option value="all">All Status</option>
                        <option value="completed">✅ Completed</option>
                        <option value="pending">⏳ Pending</option>
                    </select>
                    
                    <select id="sort-date" class="h-10 pl-3 pr-10 border border-slate-200 rounded-lg text-sm outline-none bg-white shadow-sm appearance-none bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20fill%3D%22none%22%20viewBox%3D%220%200%2020%2020%22%3E%3Cpath%20stroke%3D%22%2364748b%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%20stroke-width%3D%221.5%22%20d%3D%22m6%208%204%204%204-4%22%2F%3E%3C%2Fsvg%3E')] bg-[length:1.25rem] bg-[right_0.5rem_center] bg-no-repeat">
                        <option value="newest">🔼 Newest First</option>
                        <option value="oldest">🔽 Oldest First</option>
                    </select>

                    <button id="delete-all" class="p-2 bg-red-50 text-red-600 rounded-lg text-sm font-bold hover:bg-red-100 transition shadow-sm border border-red-100">Clear All</button>
                </div>
            </div>

            <div id="todo-list" class="flex-1 overflow-y-auto space-y-3 pr-2 custom-scrollbar pb-10">
                </div>

        </section>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
